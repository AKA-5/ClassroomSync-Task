<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="22" fill="url(#bg)"/>
  <!-- Book body -->
  <rect x="28" y="26" width="66" height="76" rx="5" fill="white"/>
  <!-- Book lines (text rows) -->
  <rect x="40" y="40" width="42" height="8"  rx="3" fill="#4f46e5" opacity=".9"/>
  <rect x="40" y="54" width="42" height="6"  rx="3" fill="#4f46e5" opacity=".6"/>
  <rect x="40" y="66" width="30" height="6"  rx="3" fill="#4f46e5" opacity=".6"/>
  <!-- Check badge -->
  <circle cx="90" cy="90" r="26" fill="#10b981"/>
  <polyline points="79,90 87,99 104,81" stroke="white" stroke-width="7"
            stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
