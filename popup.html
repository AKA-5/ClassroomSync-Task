<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClassroomSync Tasks</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="layout">

    <!-- ── Header ─────────────────────────────────────────────────────── -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon" aria-hidden="true">📚</span>
        <span class="logo-name">ClassroomSync</span>
      </div>
      <nav class="header-nav" aria-label="Toolbar">
        <button class="icon-btn" id="darkModeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
        <button class="icon-btn" id="optionsBtn" title="Settings" aria-label="Open settings">⚙️</button>
      </nav>
    </header>

    <!-- ── Main ───────────────────────────────────────────────────────── -->
    <main class="content">

      <!-- Status card -->
      <div class="card" id="statusCard">
        <div class="status-row">
          <span class="status-label">Last sync</span>
          <span class="status-value" id="lastSyncTime">Never</span>
        </div>
        <div class="status-row" id="taskCountRow" hidden>
          <span class="status-label">New tasks created</span>
          <span class="status-value" id="lastSyncCount">0</span>
        </div>
        <div class="error-msg" id="errorMsg" hidden></div>
      </div>

      <!-- Sync button -->
      <button class="sync-btn" id="syncBtn" type="button">
        <span class="sync-btn__icon" aria-hidden="true">🔄</span>
        <span class="sync-btn__label">Sync Now</span>
      </button>

      <!-- Progress -->
      <div class="progress-wrap" id="progressWrap" hidden>
        <div class="progress-bar" role="progressbar" aria-label="Sync progress">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <p class="progress-text" id="progressText" aria-live="polite">Connecting…</p>
      </div>

      <!-- Courses list -->
      <div class="section-head" id="coursesHead" hidden>
        <span>Your Courses</span>
        <span class="badge" id="coursesBadge"></span>
      </div>
      <ul class="course-list" id="courseList" aria-label="Enrolled courses"></ul>

    </main>

    <!-- ── Footer ─────────────────────────────────────────────────────── -->
    <footer class="footer">ClassroomSync Tasks v1.0</footer>

  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
