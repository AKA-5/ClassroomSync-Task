<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClassroomSync Tasks</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <a class="skip-link" href="#mainContent">Skip to main content</a>
  <!-- Toast notification — fixed overlay, shown briefly after key events -->
  <div id="toast" class="toast" hidden role="status" aria-live="assertive"></div>
  <div class="layout">

    <!-- ── Header ─────────────────────────────────────────────────────── -->
    <header class="header" role="banner">
      <div class="logo" aria-label="ClassroomSync Tasks">
        <svg class="logo-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true" focusable="false">
          <rect x="2" y="2" width="7" height="16" rx="1.5" fill="currentColor"/>
          <rect x="9" y="2" width="9" height="16" rx="1.5" fill="currentColor" opacity="0.5"/>
          <path d="M9 2v16" stroke="var(--bg)" stroke-width="1" stroke-linecap="round"/>
          <path d="M4 6h3M4 8.5h2.5M4 11h2" stroke="var(--bg)" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
        </svg>
        <span class="logo-name">ClassroomSync</span>
      </div>
      <nav class="header-nav" aria-label="Toolbar">
        <button class="icon-btn" id="darkModeToggle" aria-label="Switch to dark mode" title="Switch to dark mode">
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true" focusable="false">
            <path d="M6 1.5a6.5 6.5 0 1 0 8.5 8.5A5 5 0 0 1 6 1.5z" fill="currentColor"/>
          </svg>
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true" focusable="false">
            <circle cx="8" cy="8" r="3.5" fill="currentColor"/>
            <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.1 3.1l1.4 1.4M11.5 11.5l1.4 1.4M3.1 12.9l1.4-1.4M11.5 4.5l1.4-1.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="icon-btn" id="optionsBtn" aria-label="Open settings" title="Settings">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true" focusable="false">
            <path d="M6.55 1.5h2.9l.44 1.38c.38.15.74.36 1.06.62l1.38-.46 1.45 2.5-1.06.92c.05.33.08.66.08.95s-.03.62-.08.95l1.06.92-1.45 2.5-1.38-.46c-.32.26-.68.47-1.06.62l-.44 1.36H6.55l-.44-1.36a4.2 4.2 0 0 1-1.06-.62l-1.38.46L2.22 9.33l1.06-.92A4.6 4.6 0 0 1 3.2 7.41c0-.29.03-.62.08-.95l-1.06-.92L3.67 3.04l1.38.46c.32-.26.68-.47 1.06-.62L6.55 1.5z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
            <circle cx="8" cy="7.5" r="2" stroke="currentColor" stroke-width="1.2"/>
          </svg>
        </button>
      </nav>
    </header>

    <!-- ── Main ───────────────────────────────────────────────────────── -->
    <main class="content" id="mainContent">

      <!-- Auth connection prompt (visible only when not signed in) -->
      <div id="authPrompt" class="auth-prompt" hidden role="region" aria-label="Connect your account">
        <span class="auth-prompt__icon" aria-hidden="true">🔌</span>
        <p class="auth-prompt__text">Connect your Google Account to start syncing Classroom to Tasks</p>
      </div>

      <!-- Status card -->
      <div class="card" id="statusCard" role="region" aria-label="Sync status">
        <div class="status-row">
          <span class="status-label" id="lastSyncLabel">Last sync</span>
          <span class="status-value" id="lastSyncTime" aria-labelledby="lastSyncLabel">Never</span>
        </div>
        <div class="status-row" id="taskCountRow" hidden>
          <span class="status-label" id="taskCountLabel">New tasks created</span>
          <span class="status-value" id="lastSyncCount" aria-labelledby="taskCountLabel">0</span>
        </div>
        <div class="error-msg" id="errorMsg" role="alert" hidden></div>
      </div>

      <!-- Sync button -->
      <button class="sync-btn" id="syncBtn" type="button" aria-label="Sync Google Classroom now">
        <span class="sync-btn__icon" aria-hidden="true">
          <svg class="sync-icon-svg" width="18" height="18" viewBox="0 0 18 18" fill="none" focusable="false">
            <path d="M3 9a6 6 0 0 1 10.5-4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
            <path d="M15 9a6 6 0 0 1-10.5 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
            <polyline points="11.5,3.5 14,5.5 11.5,7.5" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            <polyline points="6.5,10.5 4,12.5 6.5,14.5" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="sync-btn__label">Sync Now</span>
        <span class="ripple-container" aria-hidden="true"></span>
      </button>

      <!-- Progress -->
      <div class="progress-wrap" id="progressWrap" hidden role="status" aria-label="Sync in progress">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Sync progress"></div>
        </div>
        <p class="progress-text" id="progressText" aria-live="polite">
          <span class="progress-spinner" aria-hidden="true"></span>
          <span id="progressTextContent">Connecting…</span>
        </p>
      </div>

      <!-- No-courses empty state (shown when authenticated but no courses discovered) -->
      <div id="noCoursesMsg" class="empty-state" hidden role="region" aria-label="No courses found">
        <span class="empty-state__icon" aria-hidden="true">📚</span>
        <p class="empty-state__text">No courses found in Google Classroom</p>
        <a href="https://classroom.google.com" target="_blank" rel="noopener noreferrer" class="empty-state__link">
          Open Google Classroom ↗
        </a>
      </div>

      <!-- Courses list -->
      <div class="section-head" id="coursesHead" hidden>
        <span>Your Courses</span>
        <span class="badge" id="coursesBadge"></span>
      </div>
      <ul class="course-list" id="courseList" aria-label="Enrolled courses" role="list"></ul>

    </main>

    <!-- ── Footer ─────────────────────────────────────────────────────── -->
    <footer class="footer" role="contentinfo">ClassroomSync Tasks v1.0</footer>

  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
